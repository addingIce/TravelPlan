<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🍃 旅行计划合集</title>
<style>
:root {
  --bg: #F5F2EB;
  --ink: #2C2C2C;
  --muted: #7A7A7A;
  --panel: #FFFFFF;
  --line: rgba(60,80,60,.14);
  --moss: #4A8B5C;
  --river: #3A7050;
  --coral: #c85d46;
  --sun: #C4956A;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; color: var(--ink); background: var(--bg); line-height: 1.55; }
a { color: inherit; text-decoration: none; }

/* Hero */
.hero {
  min-height: 52vh;
  display: grid; align-items: end;
  padding: 28px 18px 34px;
  color: #fdfbf2;
  background:
    linear-gradient(180deg, rgba(18,31,23,.15), rgba(18,31,23,.88)),
    radial-gradient(circle at 20% 18%, rgba(74,139,92,.45), transparent 22%),
    radial-gradient(circle at 82% 24%, rgba(58,112,80,.62), transparent 28%),
    linear-gradient(140deg, #1a3a2a, #2d5a3d 46%, #1e3a2a);
  position: relative; overflow: hidden;
}
.hero::after {
  content: ""; position: absolute; inset: auto 0 0;
  height: 120px; background: linear-gradient(0deg, var(--bg), transparent);
}
.hero-inner { width: min(960px,100%); margin: 0 auto; position: relative; z-index: 1; }
.eyebrow {
  display: inline-flex; gap: 8px; align-items: center;
  padding: 7px 10px; border: 1px solid rgba(255,255,255,.28);
  background: rgba(255,255,255,.1); backdrop-filter: blur(8px);
  border-radius: 999px; font-size: 13px; letter-spacing: .04em;
}
.hero h1 { font-size: clamp(34px, 6vw, 56px); margin: 16px 0 10px; font-weight: 800; letter-spacing: -.01em; }
.hero-sub { color: rgba(255,255,255,.86); font-size: 17px; max-width: 600px; }
.hero-stats { display: flex; gap: 28px; margin-top: 24px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; }
.stat b { font-size: 30px; font-weight: 800; }
.stat span { font-size: 12px; color: rgba(255,255,255,.7); letter-spacing: .12em; text-transform: uppercase; }

/* Content */
.wrap { width: min(960px,100%); margin: 0 auto; padding: 0 18px; }
.section-title {
  margin: 48px 0 4px; font-size: 20px; font-weight: 700;
  color: var(--river); display: flex; align-items: center; gap: 10px;
}
.section-title::before {
  content: ""; width: 4px; height: 20px; background: var(--moss); border-radius: 2px;
}
.section-desc { color: var(--muted); margin: 0 0 22px 14px; font-size: 14px; }

/* Cards */
.grid { display: grid; gap: 18px; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); margin-bottom: 50px; }
.card {
  background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
  overflow: hidden; box-shadow: var(--shadow); transition: transform .2s, box-shadow .2s; display: block;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,.12); }
.card-photo { aspect-ratio: 16/9; background: linear-gradient(140deg, var(--river), var(--moss)); position: relative; }
.card-photo::after {
  content: attr(data-name); position: absolute; left: 0; right: 0; bottom: 0;
  padding: 14px 16px; color: #fff; font-weight: 700; font-size: 18px;
  background: linear-gradient(0deg, rgba(0,0,0,.6), transparent);
}
.card-body { padding: 16px 18px 20px; }
.card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.pill {
  font-size: 12px; padding: 4px 10px; border-radius: 999px;
  background: rgba(74,139,92,.1); color: var(--moss); border: 1px solid rgba(74,139,92,.2);
}
.pill.warm { background: rgba(196,149,106,.12); color: var(--sun); border-color: rgba(196,149,106,.25); }
.card-desc { color: var(--muted); font-size: 14px; margin: 0 0 14px; }
.card-cta {
  display: inline-flex; align-items: center; gap: 6px; font-weight: 600;
  color: var(--river); font-size: 14px;
}
.card-cta::after { content: "→"; transition: transform .2s; }
.card:hover .card-cta::after { transform: translateX(4px); }

footer { text-align: center; color: var(--muted); font-size: 13px; padding: 30px 18px 50px; border-top: 1px solid var(--line); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <span class="eyebrow">🍃 旅行计划合集</span>
    <h1>旅行的样子</h1>
    <p class="hero-sub">把每一段旅程做成一页可分享、带地图与导航的计划。点击下方任一目的地，开始你的行程。</p>
    <div class="hero-stats">
      <div class="stat"><b>3</b><span>篇计划</span></div>
      <div class="stat"><b>9</b><span>天行程</span></div>
      <div class="stat"><b>∞</b><span>自由扩展</span></div>
    </div>
  </div>
</div>

<div class="wrap">
  <h2 class="section-title">行程精选</h2>
  <p class="section-desc">单文件 HTML，离线可看，手机友好。</p>

  <div class="grid">
    <a class="card" href="杭州2日游-旅行计划.html">
      <div class="card-photo" data-name="杭州 2 日游"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="pill">2 天</span><span class="pill warm">茶绿主题</span><span class="pill">西湖</span>
        </div>
        <p class="card-desc">断桥·白堤、三潭印月、雷峰塔…环湖经典两日，搭配飞来峰与灵隐。</p>
        <span class="card-cta">查看行程</span>
      </div>
    </a>

    <a class="card" href="金华出发避暑7日游.html">
      <div class="card-photo" data-name="金华避暑 7 日游"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="pill">7 天</span><span class="pill warm">自然棕</span><span class="pill">山水</span>
        </div>
        <p class="card-desc">百杖潭、十八涡、云和梯田…金华出发的一周山野避暑路线。</p>
        <span class="card-cta">查看行程</span>
      </div>
    </a>

    <a class="card" href="模板-旅行计划.html">
      <div class="card-photo" data-name="可复用模板" style="background:linear-gradient(140deg,#7A7A7A,#2C2C2C)"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="pill">模板</span><span class="pill warm">复用</span>
        </div>
        <p class="card-desc">空白模板：已有完整 CSS/JS/JSON 结构，复制后填入新目的地即可。</p>
        <span class="card-cta">查看模板</span>
      </div>
    </a>
  </div>
</div>

<footer>基于高德地图 · 飞猪数据 · 单文件 HTML 旅行计划</footer>

</body>
</html>
